version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neet_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neet_password}
      POSTGRES_DB: ${POSTGRES_DB:-neet_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neet_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neet_network

  redis:
    image: redis:7-alpine
    container_name: neet_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - neet_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        ENV: development
    container_name: neet_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neet_user}:${POSTGRES_PASSWORD:-neet_password}@postgres:5432/${POSTGRES_DB:-neet_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neet_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        ENV: development
    container_name: neet_worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neet_user}:${POSTGRES_PASSWORD:-neet_password}@postgres:5432/${POSTGRES_DB:-neet_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - api
    networks:
      - neet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        ENV: development
    container_name: neet_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - neet_network

volumes:
  postgres_data:
  redis_data:

networks:
  neet_network:
    driver: bridge
